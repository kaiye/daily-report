# RSS Sources for Media Section
# Add or remove sources as needed.
# Supports any public RSS feed URL.
# Tip: RSSHub (https://rsshub.app) can generate RSS feeds for many sites
#      that don't natively provide them (e.g., blog posts, social accounts).
#      Example: https://rsshub.app/anthropic/news

sources:
