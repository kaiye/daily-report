# Daily Report — Main Configuration
# Fork this repo and edit this file to customize your daily report.

# LLM settings
# API key: set OPENAI_API_KEY environment variable
# Compatible with any OpenAI-compatible endpoint (SiliconFlow, DeepSeek, etc.)
llm:
  base_url: https://cc.dingsum.com/v1
  model: gpt-5.4
  temperature: 0.2
  proxy: ""   # optional; set empty to disable

# Output preferences
output:
  language: zh-cn   # e.g. zh-cn / en / ja
  section_titles:
    media: 媒体资讯
    github: Github 趋势
    x: X 热点

# Verification + repair loop
verify:
  max_repair_attempts: 2

# ── Section settings ─────────────────────────────────────────────────────────
# Each section has:
#   - operational settings (hours, max_results, etc.)
#   - llm_directive: tells the LLM HOW to sort/filter/summarize the raw data
#     This is the main user-configurable knob.

media:
  hours: 24   # fetch articles from the past N hours
  max_items: 9
  llm_directive: |
    Select the most important AI news items. Max {{max_items}} items total.
    First priority: items whose title or summary clearly mention these brands/companies/topics:
    {{priority_keywords}}.
    Use post.items.priority_score, post.items.matched_keywords and post.items.signal_tags as strong ranking signals.
    Then prioritize: major product launches/updates > major funding/M&A > major technical breakthroughs.
    If multiple items cover the same event, keep the most information-dense one and fill remaining slots with different topics.
    Do not over-concentrate on one company if equally important events from other priority brands exist.
    For each item, write summary as exactly one sentence.
    Prefer a concise event summary grounded in the original article, not a multi-sentence industry analysis.
    Do not simply repeat the title verbatim inside the item summary.
    Keep the media outlet's framing where possible and avoid switching into a detached third-party commentary voice.
    Do not default to outlook language unless it is clearly supported by the title/summary.
    All JSON string fields must be written in {{output_language}}.
    The summary must be exactly one sentence describing the single most important trend.

github:
  since: daily        # daily | weekly | monthly
  max_results: 15     # how many repos to include
  llm_directive: |
    Keep only AI-related repos. If a repo has some relevance to AI, keep it; if totally unrelated, drop it.
    Include up to {{max_items}} repos and follow the order in post.json (rank ascending).
    Keep description close to the repository's own wording and make it read like a faithful Chinese translation.
    Keep description within one sentence.
    Prefer preserving the project's original framing over rewriting it into a generic explanation.
    Avoid mechanical patterns like “一个……用于……”, unless that is already the clearest faithful translation of the source description.
    If the original description is already clear, only lightly normalize it.
    All JSON string fields must be written in {{output_language}}.
    The summary must be exactly one sentence describing the hottest shared direction across kept items.

x:
  hours: 24        # tweet search window in hours
  min_faves: 1000  # minimum likes threshold
  top_n: 10        # max tweets to include
  llm_directive: |
    Select the most insightful AI tweets, max {{max_items}}, while keeping topics diverse.
    Keep the order in post.json and avoid over-concentrating on one single event.
    If multiple early posts are the same topic, keep official account content first (use is_official=true), drop similar non-official repeats, and use later different topics to fill remaining slots.
    Rewrite each text into a concise paraphrase that preserves the original tone and perspective.
    All JSON string fields must be written in {{output_language}}.
    The summary must be exactly one sentence describing the single most important common signal across items.

# Post-processing (ported from skills/daily-reports and adapted)
post_process:
  media:
    history_days: 3
    truncate_chars: 300
    html2md_strategy: article
  x:
    min_text_length: 20
    max_items: 0                   # 0 = keep as many as possible
